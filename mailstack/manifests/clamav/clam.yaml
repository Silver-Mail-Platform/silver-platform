apiVersion: apps/v1
kind: Deployment
metadata:
  name: clamav-server
  namespace: default
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: clamav-server
  template:
    metadata:
      labels:
        app: clamav-server
    spec:
      initContainers:
        - name: freshclam-init
          image: ghcr.io/lsflk/silver-clamav:latest
          command:
            - sh
            - -lc
            - >
              freshclam --config-file=/etc/clamav/freshclam.conf --verbose
              || (sleep 2; freshclam --config-file=/etc/clamav/freshclam.conf --verbose)
          volumeMounts:
            - name: clamav-db
              mountPath: /var/lib/clamav
            - name: freshclam-conf
              mountPath: /etc/clamav/freshclam.conf
              subPath: freshclam.conf

      containers:
        - name: clamav-server
          image: ghcr.io/lsflk/silver-clamav:latest
          env:
            - name: CLAMAV_NO_FRESHCLAMD
              value: "false"
          resources:
            limits:
              memory: "3Gi"
          volumeMounts:
            - name: clamav-db
              mountPath: /var/lib/clamav
            - name: clamav-logs
              mountPath: /var/log/clamav
            - name: clamav-run
              mountPath: /var/run/clamav

      volumes:
        - name: clamav-db
          persistentVolumeClaim:
            claimName: clamav-db
        - name: clamav-logs
          persistentVolumeClaim:
            claimName: clamav-logs
        - name: clamav-run
          emptyDir: {}
        - name: freshclam-conf
          configMap:
            name: clamav-freshclam-config